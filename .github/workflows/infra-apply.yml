name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/infra-plan.yml"
      - ".github/workflows/infra-apply.yml"
      - ".github/workflows/reusable-infra-apply.yml"

permissions:
  id-token: write
  contents: read

jobs:
  apply-central:
    name: Apply — central
    uses: ./.github/workflows/reusable-infra-apply.yml
    with:
      aws_region: "us-east-1"
      tf_dir: "infra/environments/central"
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
