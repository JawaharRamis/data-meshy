name: Reusable -- Terraform Plan

on:
  workflow_call:
    inputs:
      aws_region:
        description: "AWS region to target."
        type: string
        default: "us-east-1"
      tf_dir:
        description: "Terraform working directory (relative to repo root)."
        type: string
        default: "infra/"
    secrets:
      AWS_ACCOUNT_ID:
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Terraform Plan (${{ inputs.tf_dir }})
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.tf_dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/TerraformPlanRole
          aws-region: ${{ inputs.aws_region }}
          role-session-name: TerraformPlan-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: true

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false
        env:
          TF_INPUT: "false"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan.bin
        env:
          TF_INPUT: "false"
        continue-on-error: false

      - name: Upload plan artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ inputs.tf_dir }}/tfplan.bin
          retention-days: 5

      - name: Post plan output to PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        if: always() && github.event_name == 'pull_request'
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `<!-- tf-plan-${{ inputs.tf_dir }} -->`;
            const existingComment = comments.find(c => c.body.includes(marker));

            const fmtIcon      = process.env.FMT_OUTCOME      === 'success' ? 'OK' : 'WARN';
            const validateIcon = process.env.VALIDATE_OUTCOME  === 'success' ? 'OK' : 'FAIL';
            const planIcon     = process.env.PLAN_OUTCOME      === 'success' ? 'OK' : 'FAIL';

            const body = `${marker}
            ## Terraform Plan -- \`${{ inputs.tf_dir }}\`

            | Step | Status |
            |------|--------|
            | Format | ${fmtIcon} \`${{ steps.fmt.outcome }}\` |
            | Validate | ${validateIcon} \`${{ steps.validate.outcome }}\` |
            | Plan | ${planIcon} \`${{ steps.plan.outcome }}\` |

            <details><summary>Show Plan Output</summary>

            \`\`\`hcl
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Workflow: \`${{ github.workflow }}\` | Run: \`${{ github.run_id }}\` | Actor: \`${{ github.actor }}\`*
            `;

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
